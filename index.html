<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1e40af;
      --primary-dark: #1e3a8a;
      --surface: #ffffff;
      --background: #f8fafc;
      --text: #0f172a;
      --text-light: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --danger: #ef4444;
      --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--background);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 250px;
      padding: 0.625rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.875rem;
      font-family: inherit;
      background: var(--surface);
      transition: all 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
    }

    /* Buttons */
    .btn {
      padding: 0.625rem 1.25rem;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--background);
    }

    .btn-sm {
      padding: 0.375rem 0.75rem;
      font-size: 0.813rem;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    /* Table */
    .table-wrapper {
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--background);
      border-bottom: 1px solid var(--border);
    }

    th {
      text-align: left;
      padding: 0.875rem 1rem;
      font-weight: 600;
      font-size: 0.813rem;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td {
      padding: 0.875rem 1rem;
      font-size: 0.875rem;
      border-top: 1px solid var(--border);
    }

    tbody tr {
      transition: background 0.15s;
    }

    tbody tr:hover {
      background: var(--background);
    }

    .employee-name {
      font-weight: 500;
      color: var(--text);
    }

    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.625rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .status-regular {
      background: #d1fae5;
      color: #065f46;
    }

    .status-active {
      background: #dbeafe;
      color: #1e40af;
    }

    .status-probation {
      background: #fef3c7;
      color: #92400e;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(2px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border-radius: 8px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 1.125rem;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-light);
      padding: 0;
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: var(--background);
      color: var(--text);
    }

    .modal-body {
      padding: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text);
      font-size: 0.875rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.875rem;
      font-family: inherit;
      background: var(--surface);
      transition: all 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .modal-footer {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      background: var(--background);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-light);
    }

    .spinner {
      border: 2px solid var(--border);
      border-top: 2px solid var(--primary);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-light);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--surface);
      padding: 1rem 1.25rem;
      border-radius: 6px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      z-index: 2000;
      font-size: 0.875rem;
    }

    .toast.success {
      border-left: 3px solid var(--success);
    }

    .toast.error {
      border-left: 3px solid var(--danger);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }

      .toolbar {
        flex-direction: column;
        width: 100%;
      }

      .search-input {
        width: 100%;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 0.75rem;
      }

      th, td {
        padding: 0.625rem 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>Employee Management</h1>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Employee</button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input 
        type="text" 
        id="searchInput" 
        class="search-input" 
        placeholder="Search employees..."
      />
    </div>

    <!-- Table -->
    <div class="table-wrapper">
      <div id="loadingState" class="loading">
        <div class="spinner"></div>
        <p>Loading employees...</p>
      </div>
      
      <div id="tableContent" style="display: none;">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Company</th>
              <th>Status</th>
              <th>TIN</th>
              <th>Salary</th>
              <th>SSS</th>
              <th>PhilHealth</th>
              <th>Pag-IBIG</th>
              <th>Tax</th>
              <th>Bank Account</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="employeeTableBody"></tbody>
        </table>
      </div>

      <div id="emptyState" class="empty-state" style="display: none;">
        <p>No employees found</p>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="employeeModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Employee</h2>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <form id="employeeForm" onsubmit="saveEmployee(event)">
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group">
              <label>First Name *</label>
              <input type="text" id="firstName" required />
            </div>
            <div class="form-group">
              <label>Last Name *</label>
              <input type="text" id="lastName" required />
            </div>
          </div>

          <div class="form-group">
            <label>Company *</label>
            <input type="text" id="company" required />
          </div>

          <div class="form-group">
            <label>Employment Status *</label>
            <select id="employmentStatus" required>
              <option value="">Select status</option>
              <option value="Active">Active</option>
              <option value="Regular">Regular</option>
              <option value="Probation">Probation</option>
              <option value="Resigned">Resigned</option>
              <option value="Terminated">Terminated</option>
            </select>
          </div>

          <div class="form-group">
            <label>TIN</label>
            <input type="text" id="tin" placeholder="Optional" />
          </div>

          <div class="form-group">
            <label>Basic Salary *</label>
            <input type="number" step="0.01" id="basicSalary" required />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>SSS (Employee) *</label>
              <input type="number" step="0.01" id="sssEmployee" required />
            </div>
            <div class="form-group">
              <label>PhilHealth (Employee) *</label>
              <input type="number" step="0.01" id="philhealthEmployee" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Pag-IBIG (Employee) *</label>
              <input type="number" step="0.01" id="pagibigEmployee" required />
            </div>
            <div class="form-group">
              <label>Withholding Tax *</label>
              <input type="number" step="0.01" id="withholdingTax" required />
            </div>
          </div>

          <div class="form-group">
            <label>Bank Account</label>
            <input type="text" id="bankAccount" placeholder="Optional" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let employees = [];
    let editingEmployeeId = null;
    const API_BASE = "https://primary-production-a810.up.railway.app/webhook";

    // Initialize
    window.addEventListener("load", () => {
      loadEmployees();
      setupSearch();
    });

    // Load employees
    async function loadEmployees() {
      const loadingState = document.getElementById("loadingState");
      const tableContent = document.getElementById("tableContent");
      const emptyState = document.getElementById("emptyState");

      try {
        const response = await fetch(`${API_BASE}/GET/pe-db/employees`);
        if (!response.ok) throw new Error("Failed to fetch");

        const data = await response.json();
        employees = Array.isArray(data) ? data : [data];
        
        loadingState.style.display = "none";

        if (employees.length === 0) {
          emptyState.style.display = "block";
        } else {
          tableContent.style.display = "block";
          renderEmployees(employees);
        }
      } catch (error) {
        console.error("Error:", error);
        loadingState.innerHTML = `
          <p style="color: var(--danger);">Failed to load employees</p>
          <button class="btn btn-primary btn-sm" onclick="loadEmployees()" style="margin-top: 1rem;">Retry</button>
        `;
        showToast("Failed to load employees", "error");
      }
    }

    // Render table
    function renderEmployees(data) {
      const tbody = document.getElementById("employeeTableBody");
      tbody.innerHTML = "";

      data.forEach((emp, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td><span class="employee-name">${emp.first_name} ${emp.last_name}</span></td>
          <td>${emp.company || "-"}</td>
          <td>
            <span class="status-badge status-${emp.employment_status?.toLowerCase() || 'active'}">
              ${emp.employment_status || "N/A"}
            </span>
          </td>
          <td>${emp.tin || "-"}</td>
          <td>₱${parseFloat(emp.basic_salary || 0).toLocaleString('en-PH', {minimumFractionDigits: 2})}</td>
          <td>₱${parseFloat(emp.sss_employee || 0).toLocaleString('en-PH')}</td>
          <td>₱${parseFloat(emp.philhealth_employee || 0).toLocaleString('en-PH')}</td>
          <td>₱${parseFloat(emp.pagibig_employee || 0).toLocaleString('en-PH')}</td>
          <td>₱${parseFloat(emp.withholding_tax || 0).toLocaleString('en-PH', {minimumFractionDigits: 2})}</td>
          <td>${emp.bank_account || "-"}</td>
          <td>
            <div class="actions">
              <button class="btn btn-secondary btn-sm" onclick="editEmployee(${index})">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteEmployee(${index})">Delete</button>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    // Search
    function setupSearch() {
      document.getElementById("searchInput").addEventListener("input", (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = employees.filter(emp => 
          `${emp.first_name} ${emp.last_name}`.toLowerCase().includes(query) ||
          emp.company?.toLowerCase().includes(query) ||
          emp.employment_status?.toLowerCase().includes(query)
        );
        renderEmployees(filtered);
      });
    }

    // Modal functions
    function openAddModal() {
      editingEmployeeId = null;
      document.getElementById("modalTitle").textContent = "Add Employee";
      document.getElementById("submitBtn").textContent = "Save";
      document.getElementById("employeeForm").reset();
      document.getElementById("employeeModal").classList.add("active");
    }

    function editEmployee(index) {
      editingEmployeeId = index;
      const emp = employees[index];
      
      document.getElementById("modalTitle").textContent = "Edit Employee";
      document.getElementById("submitBtn").textContent = "Update";
      
      document.getElementById("firstName").value = emp.first_name || "";
      document.getElementById("lastName").value = emp.last_name || "";
      document.getElementById("company").value = emp.company || "";
      document.getElementById("employmentStatus").value = emp.employment_status || "";
      document.getElementById("tin").value = emp.tin || "";
      document.getElementById("basicSalary").value = emp.basic_salary || "";
      document.getElementById("sssEmployee").value = emp.sss_employee || "";
      document.getElementById("philhealthEmployee").value = emp.philhealth_employee || "";
      document.getElementById("pagibigEmployee").value = emp.pagibig_employee || "";
      document.getElementById("withholdingTax").value = emp.withholding_tax || "";
      document.getElementById("bankAccount").value = emp.bank_account || "";
      
      document.getElementById("employeeModal").classList.add("active");
    }

    function closeModal() {
      document.getElementById("employeeModal").classList.remove("active");
      editingEmployeeId = null;
    }

    // Save employee
    async function saveEmployee(event) {
      event.preventDefault();
      
      const formData = new FormData(event.target);
      const data = {
        first_name: document.getElementById("firstName").value,
        last_name: document.getElementById("lastName").value,
        company: document.getElementById("company").value,
        employment_status: document.getElementById("employmentStatus").value,
        tin: document.getElementById("tin").value || null,
        basic_salary: parseFloat(document.getElementById("basicSalary").value).toFixed(2),
        sss_employee: parseFloat(document.getElementById("sssEmployee").value).toFixed(2),
        philhealth_employee: parseFloat(document.getElementById("philhealthEmployee").value).toFixed(2),
        pagibig_employee: parseFloat(document.getElementById("pagibigEmployee").value).toFixed(2),
        withholding_tax: parseFloat(document.getElementById("withholdingTax").value).toFixed(2),
        bank_account: document.getElementById("bankAccount").value || null
      };

      try {
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;
        submitBtn.textContent = "Saving...";

        let response;
        if (editingEmployeeId !== null) {
          response = await fetch(`${API_BASE}/PUT/pe-db/employees/${employees[editingEmployeeId].id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
          });
        } else {
          // Add new employee using the add-employee endpoint
          response = await fetch(`${API_BASE}/POST/pe-db/add-employee`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
          });
        }

        if (!response.ok) throw new Error("Failed to save");

        closeModal();
        await loadEmployees();
        showToast(editingEmployeeId !== null ? "Employee updated" : "Employee added", "success");
      } catch (error) {
        console.error("Error:", error);
        showToast("Failed to save employee", "error");
      } finally {
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = false;
        submitBtn.textContent = editingEmployeeId !== null ? "Update" : "Save";
      }
    }

    // Delete employee
    async function deleteEmployee(index) {
      const emp = employees[index];
      if (!confirm(`Delete ${emp.first_name} ${emp.last_name}?`)) return;

      try {
        const response = await fetch(`${API_BASE}/DELETE/pe-db/employees/${emp.id}`, {
          method: "DELETE"
        });

        if (!response.ok) throw new Error("Failed to delete");

        await loadEmployees();
        showToast("Employee deleted", "success");
      } catch (error) {
        console.error("Error:", error);
        showToast("Failed to delete employee", "error");
      }
    }

    // Toast notification
    function showToast(message, type = "success") {
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 3000);
    }

    // Close modal on outside click
    document.getElementById("employeeModal").addEventListener("click", (e) => {
      if (e.target.id === "employeeModal") closeModal();
    });
  </script>
</body>
</html>
