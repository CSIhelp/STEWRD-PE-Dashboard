<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Page</title>
</head>
<body>

  <!-- Element where the webhook output will be displayed -->
  <div id="webhook-output">Loading...</div>

  <script>
    async function triggerN8nWebhook() {
      const webhookUrl = "https://primary-production-a810.up.railway.app/webhook/GET/pe-db/employees";
      const outputEl = document.getElementById("webhook-output");

      try {
        const response = await fetch(webhookUrl, { method: "GET" });

        // Read the body ONCE
        const raw = await response.json();
        console.log("Raw response:", raw);
        console.log("Type:", typeof raw);

        // Unwrap n8n's array wrapper if needed
        const data = Array.isArray(raw) ? raw[0] : raw;
        console.log("Data:", data);

        if (response.ok) {
          // Display fields from your Postgres row
          outputEl.innerHTML = `
            <p><strong>Name:</strong> ${data.fn} ${data.mn} ${data.ln}</p>
            <p><strong>Email:</strong> ${data.email}</p>
            <p><strong>Status:</strong> ${data.status}</p>
            <p><strong>Department ID:</strong> ${data.dep_id}</p>
            <p><strong>Salary:</strong> ${data.salary}</p>
          `;
        } else {
          outputEl.innerHTML = "Something went wrong.";
        }
      } catch (error) {
        console.error("Webhook call failed:", error);
        outputEl.innerHTML = "Failed to load data.";
      }
    }

    window.addEventListener("load", triggerN8nWebhook);
  </script>

</body>
</html>
