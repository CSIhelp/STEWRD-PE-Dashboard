<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1e40af;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg-main: #0f172a;
      --bg-card: #1e293b;
      --bg-hover: #334155;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #64748b;
      --border: #334155;
      --shadow: rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, var(--bg-main) 0%, #1a1f35 100%);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px solid var(--border);
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-title h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .employee-count {
      background: var(--bg-card);
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .employee-count strong {
      color: var(--primary);
      font-weight: 600;
    }

    /* Buttons */
    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.938rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
    }

    .btn-small {
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-success:hover {
      background: #059669;
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .btn-danger:hover {
      background: var(--danger);
      color: white;
    }

    .btn-secondary {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    /* Table Container */
    .table-container {
      background: var(--bg-card);
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 8px 32px var(--shadow);
      border: 1px solid var(--border);
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: linear-gradient(135deg, #1e3a8a 0%, var(--primary) 100%);
    }

    th {
      padding: 1rem;
      text-align: left;
      font-weight: 600;
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: white;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: all 0.2s ease;
    }

    tbody tr:hover {
      background: var(--bg-hover);
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    td {
      padding: 1rem;
      color: var(--text-secondary);
      font-size: 0.938rem;
    }

    td:first-child {
      font-weight: 500;
      color: var(--text-primary);
    }

    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-active {
      background: rgba(16, 185, 129, 0.2);
      color: var(--success);
      border: 1px solid var(--success);
    }

    .status-inactive {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .actions {
      display: flex;
      gap: 0.5rem;
    }

    .currency {
      font-family: 'JetBrains Mono', monospace;
      color: var(--primary);
      font-weight: 500;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      padding: 2rem;
      overflow-y: auto;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: modalFadeIn 0.3s ease-out;
    }

    @keyframes modalFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: var(--bg-card);
      border-radius: 1rem;
      padding: 2rem;
      max-width: 800px;
      width: 100%;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: modalSlideUp 0.3s ease-out;
    }

    @keyframes modalSlideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
    }

    .modal-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.25rem;
      line-height: 1;
      transition: color 0.2s ease;
    }

    .close-btn:hover {
      color: var(--text-primary);
    }

    /* Form */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 500;
      font-size: 0.875rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, select {
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: var(--bg-main);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.938rem;
      transition: all 0.2s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .loading::after {
      content: '...';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .empty-state h3 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .table-container {
        font-size: 0.875rem;
      }

      th, td {
        padding: 0.75rem 0.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-title">
        <h1>Employee Dashboard</h1>
        <div class="employee-count">
          <strong id="employee-count">0</strong> employees
        </div>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">
        <span>+</span> Add Employee
      </button>
    </div>

    <!-- Table -->
    <div class="table-container">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Role ID</th>
              <th>Company</th>
              <th>Status</th>
              <th>Basic Salary</th>
              <th>SSS</th>
              <th>PhilHealth</th>
              <th>Pag-IBIG</th>
              <th>W. Tax</th>
              <th>Bank Account</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="employee-table-body">
            <tr>
              <td colspan="11" class="loading">Loading employees</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="employee-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Add Employee</h2>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      
      <form id="employee-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="first_name">First Name *</label>
            <input type="text" id="first_name" name="first_name" required>
          </div>
          
          <div class="form-group">
            <label for="last_name">Last Name *</label>
            <input type="text" id="last_name" name="last_name" required>
          </div>
          
          <div class="form-group">
            <label for="role_id">Role ID *</label>
            <input type="text" id="role_id" name="role_id" required>
          </div>
          
          <div class="form-group">
            <label for="company">Company *</label>
            <input type="text" id="company" name="company" required>
          </div>
          
          <div class="form-group">
            <label for="employment_status">Employment Status *</label>
            <select id="employment_status" name="employment_status" required>
              <option value="">Select Status</option>
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="basic_salary">Basic Salary (₱) *</label>
            <input type="number" id="basic_salary" name="basic_salary" step="0.01" required>
          </div>
          
          <div class="form-group">
            <label for="sss_employee">SSS Employee (₱)</label>
            <input type="number" id="sss_employee" name="sss_employee" step="0.01">
          </div>
          
          <div class="form-group">
            <label for="philhealth_employee">PhilHealth Employee (₱)</label>
            <input type="number" id="philhealth_employee" name="philhealth_employee" step="0.01">
          </div>
          
          <div class="form-group">
            <label for="pagibig_employee">Pag-IBIG Employee (₱)</label>
            <input type="number" id="pagibig_employee" name="pagibig_employee" step="0.01">
          </div>
          
          <div class="form-group">
            <label for="withholding_tax">Withholding Tax (₱)</label>
            <input type="number" id="withholding_tax" name="withholding_tax" step="0.01">
          </div>
          
          <div class="form-group full-width">
            <label for="bank_account">Bank Account</label>
            <input type="text" id="bank_account" name="bank_account">
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-success" id="submit-btn">Save Employee</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Configuration
    const API_BASE = "https://primary-production-a810.up.railway.app/webhook";
    
    // State
    let employees = [];
    let editingEmployeeId = null;

    // Initialize
    window.addEventListener("load", loadEmployees);

    // Load employees from API
    async function loadEmployees() {
      try {
        const response = await fetch(`${API_BASE}/GET/pe-db/employees`);
        const data = await response.json();
        
        // Handle n8n array wrapper
        employees = Array.isArray(data) ? data : [data];
        
        renderEmployees();
      } catch (error) {
        console.error("Failed to load employees:", error);
        document.getElementById("employee-table-body").innerHTML = `
          <tr>
            <td colspan="11" class="empty-state">
              <h3>Failed to load employees</h3>
              <p>Please check your connection and try again.</p>
            </td>
          </tr>
        `;
      }
    }

    // Render employees table
    function renderEmployees() {
      const tbody = document.getElementById("employee-table-body");
      const countEl = document.getElementById("employee-count");
      
      countEl.textContent = employees.length;

      if (employees.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="11" class="empty-state">
              <h3>No employees yet</h3>
              <p>Click "Add Employee" to create your first employee record.</p>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = employees.map((emp, index) => `
        <tr>
          <td><strong>${emp.first_name} ${emp.last_name}</strong></td>
          <td>${emp.role_id || '-'}</td>
          <td>${emp.company || '-'}</td>
          <td>
            <span class="status-badge ${emp.employment_status === 'Active' ? 'status-active' : 'status-inactive'}">
              ${emp.employment_status || 'Unknown'}
            </span>
          </td>
          <td class="currency">₱${formatNumber(emp.basic_salary)}</td>
          <td class="currency">₱${formatNumber(emp.sss_employee)}</td>
          <td class="currency">₱${formatNumber(emp.philhealth_employee)}</td>
          <td class="currency">₱${formatNumber(emp.pagibig_employee)}</td>
          <td class="currency">₱${formatNumber(emp.withholding_tax)}</td>
          <td>${emp.bank_account || '-'}</td>
          <td>
            <div class="actions">
              <button class="btn btn-small btn-secondary" onclick="editEmployee(${index})">Edit</button>
              <button class="btn btn-small btn-danger" onclick="deleteEmployee(${index})">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // Format numbers with commas
    function formatNumber(value) {
      if (!value && value !== 0) return '0.00';
      return parseFloat(value).toLocaleString('en-PH', { 
        minimumFractionDigits: 2, 
        maximumFractionDigits: 2 
      });
    }

    // Open Add Modal
    function openAddModal() {
      editingEmployeeId = null;
      document.getElementById("modal-title").textContent = "Add Employee";
      document.getElementById("submit-btn").textContent = "Save Employee";
      document.getElementById("employee-form").reset();
      document.getElementById("employee-modal").classList.add("active");
    }

    // Edit Employee
    function editEmployee(index) {
      editingEmployeeId = index;
      const emp = employees[index];
      
      document.getElementById("modal-title").textContent = "Edit Employee";
      document.getElementById("submit-btn").textContent = "Update Employee";
      
      // Populate form
      document.getElementById("first_name").value = emp.first_name || '';
      document.getElementById("last_name").value = emp.last_name || '';
      document.getElementById("role_id").value = emp.role_id || '';
      document.getElementById("company").value = emp.company || '';
      document.getElementById("employment_status").value = emp.employment_status || '';
      document.getElementById("basic_salary").value = emp.basic_salary || '';
      document.getElementById("sss_employee").value = emp.sss_employee || '';
      document.getElementById("philhealth_employee").value = emp.philhealth_employee || '';
      document.getElementById("pagibig_employee").value = emp.pagibig_employee || '';
      document.getElementById("withholding_tax").value = emp.withholding_tax || '';
      document.getElementById("bank_account").value = emp.bank_account || '';
      
      document.getElementById("employee-modal").classList.add("active");
    }

    // Delete Employee
    function deleteEmployee(index) {
      if (confirm(`Are you sure you want to delete ${employees[index].first_name} ${employees[index].last_name}?`)) {
        employees.splice(index, 1);
        renderEmployees();
        
        // TODO: Send DELETE request to your n8n endpoint
        // await fetch(`${API_BASE}/DELETE/pe-db/employees/${employeeId}`, { method: 'DELETE' });
      }
    }

    // Close Modal
    function closeModal() {
      document.getElementById("employee-modal").classList.remove("active");
      editingEmployeeId = null;
    }

    // Handle Form Submit
    document.getElementById("employee-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const formData = new FormData(e.target);
      const employeeData = Object.fromEntries(formData.entries());
      
      // Convert numeric fields
      ['basic_salary', 'sss_employee', 'philhealth_employee', 'pagibig_employee', 'withholding_tax'].forEach(field => {
        if (employeeData[field]) {
          employeeData[field] = parseFloat(employeeData[field]);
        }
      });

      if (editingEmployeeId !== null) {
        // Update existing employee
        employees[editingEmployeeId] = { ...employees[editingEmployeeId], ...employeeData };
        
        // TODO: Send PUT request to your n8n endpoint
        // await fetch(`${API_BASE}/PUT/pe-db/employees/${employeeId}`, {
        //   method: 'PUT',
        //   headers: { 'Content-Type': 'application/json' },
        //   body: JSON.stringify(employeeData)
        // });
      } else {
        // Add new employee
        employees.push(employeeData);
        
        // TODO: Send POST request to your n8n endpoint
        // await fetch(`${API_BASE}/POST/pe-db/employees`, {
        //   method: 'POST',
        //   headers: { 'Content-Type': 'application/json' },
        //   body: JSON.stringify(employeeData)
        // });
      }

      renderEmployees();
      closeModal();
    });

    // Close modal on outside click
    document.getElementById("employee-modal").addEventListener("click", (e) => {
      if (e.target.id === "employee-modal") {
        closeModal();
      }
    });
  </script>

</body>
</html>
