<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Page</title>
</head>
<body>

  <!-- Element where the webhook output will be displayed -->
  <div id="webhook-output">Loading...</div>

  <script>
    async function triggerN8nWebhook() {
      const webhookUrl = "https://primary-production-a810.up.railway.app/webhook/GET/pe-db/employees";
      const outputEl = document.getElementById("webhook-output");

      try {
        const response = await fetch(webhookUrl, { method: "GET" });

        // Read the body ONCE
        const raw = await response.json();
        console.log("Raw response:", raw);
        console.log("Type:", typeof raw);

        // Handle both single object and array of items
        const items = Array.isArray(raw) ? raw : [raw];
        console.log("Items:", items);

        if (response.ok) {
          outputEl.innerHTML = items.map(data => `
            <div style="border: 1px solid #ccc; padding: 12px; margin-bottom: 12px; border-radius: 8px;">
              <p><strong>Name:</strong> ${data.first_name} ${data.last_name}</p>
              <p><strong>Role ID:</strong> ${data.role_id}</p>
              <p><strong>Company:</strong> ${data.company}</p>
              <p><strong>Employment Status:</strong> ${data.employment_status}</p>
              <p><strong>Basic Salary:</strong> ${data.basic_salary}</p>
              <p><strong>SSS (Employee):</strong> ${data.sss_employee}</p>
              <p><strong>PhilHealth (Employee):</strong> ${data.philhealth_employee}</p>
              <p><strong>Pag-IBIG (Employee):</strong> ${data.pagibig_employee}</p>
              <p><strong>Withholding Tax:</strong> ${data.withholding_tax}</p>
              <p><strong>Bank Account:</strong> ${data.bank_account}</p>
            </div>
          `).join("");
        } else {
          outputEl.innerHTML = "Something went wrong.";
        }
      } catch (error) {
        console.error("Webhook call failed:", error);
        outputEl.innerHTML = "Failed to load data.";
      }
    }

    window.addEventListener("load", triggerN8nWebhook);
  </script>

</body>
</html>
