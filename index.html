<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Page</title>
</head>
<body>

  <!-- Element where the webhook output will be displayed -->
  <div id="webhook-output">Loading...</div>

  <script>
    async function triggerN8nWebhook() {
      const params = new URLSearchParams({
        event: "page_opened",
        timestamp: new Date().toISOString(),
        page: window.location.href
      });

      const webhookUrl = `https://primary-production-a810.up.railway.app/webhook/GET/pe-db/employees`;
      const outputEl = document.getElementById("webhook-output");

      try {
        const response = await fetch(webhookUrl, { method: "GET" });
const data = await response.json();

console.log("Raw response:", data);         // See the full structure
console.log("Type:", typeof data);           // object? array?
document.getElementById("webhook-output").innerHTML = JSON.stringify(data, null, 2);

        if (response.ok) {
          const data = await response.json(); // or response.text() if not JSON

          // Display the response — adjust based on your n8n output structure
          outputEl.innerHTML = data.message;

        } else {
          outputEl.innerHTML = "Something went wrong.";
        }
      } catch (error) {
        console.error("Webhook call failed:", error);
        outputEl.innerHTML = "Failed to load data.";
      }
    }

    window.addEventListener("load", triggerN8nWebhook);
  </script>

</body>
</html>
