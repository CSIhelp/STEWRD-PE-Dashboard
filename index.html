<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Page</title>
</head>
<body>

  <!-- Your page content here -->

  <script>
    async function triggerN8nWebhook() {
      const webhookUrl = "https://primary-production-a810.up.railway.app/webhook/GET/pe-db/employees";

      try {
        const response = await fetch(webhookUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            event: "page_opened",
            timestamp: new Date().toISOString(),
            page: window.location.href
          })
        });

        if (response.ok) {
          console.log("Webhook triggered successfully");
        } else {
          console.warn("Webhook responded with status:", response.status);
        }
      } catch (error) {
        console.error("Webhook call failed:", error);
      }
    }

    // Fire when the page fully loads
    window.addEventListener("load", triggerN8nWebhook);
  </script>

</body>
</html>
